<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Crédito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:600}
.user-pill{font-size:12px;background:#fff;border:0.5px solid #ddd;border-radius:20px;padding:4px 12px;color:#555;cursor:pointer}
.user-pill:hover{background:#f0efe9}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.stat{background:#fff;border:0.5px solid #e0ddd5;border-radius:8px;padding:5px 10px;font-size:12px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}
button{border:0.5px solid #ccc;background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#1a1a1a}
button:hover{background:#f0efe9}
button.primary{background:#185FA5;color:#B5D4F4;border-color:#185FA5}
button.primary:hover{background:#0C447C}
.tabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:0.5px solid #ddd;padding-bottom:8px}
.tab{padding:5px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888}
.tab.active{background:#ececec;color:#1a1a1a;font-weight:500}
.client-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;margin-bottom:8px;overflow:hidden;border-left:3px solid #aaa}
.client-card.espera{border-left-color:#B4B2A9}
.client-card.proceso{border-left-color:#EF9F27}
.client-card.comite{border-left-color:#7F77DD}
.client-card.decision{border-left-color:#378ADD}
.client-card.cargado{border-left-color:#1D9E75}
.client-card.devuelto{border-left-color:#E24B4A}
.priotag{font-size:10px;background:#FAEEDA;color:#854F0B;padding:2px 5px;border-radius:4px;margin-left:4px}
.card-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}
.card-head:hover{background:#fafaf8}
.card-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.card-title-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-name{font-weight:500;font-size:13px}
.card-nit{font-size:11px;color:#888}
.card-roles-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:2px}
.role-status{font-size:11px;color:#555}
.role-status b{color:#1a1a1a}
.card-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.sla-ok{background:#EAF3DE;color:#3B6D11}
.sla-warn{background:#FAEEDA;color:#854F0B}
.sla-over{background:#FCEBEB;color:#791F1F}
.sla-paused{background:#F1EFE8;color:#5F5E5A}
.sla-none{background:#f0efe9;color:#aaa}
.arrow{font-size:10px;color:#aaa;transition:transform 0.2s}
.card-body{padding:12px 16px;border-top:0.5px solid #e0ddd5;display:none}
.card-body.open{display:block}
.stabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:0.5px solid #e0ddd5;padding-bottom:6px;flex-wrap:wrap}
.stab{padding:4px 10px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#888;border-radius:8px}
.stab.active{background:#ececec;color:#1a1a1a;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fl{font-size:11px;color:#888;display:block;margin-bottom:3px}
select,input[type=text],input[type=date]{width:100%;border:0.5px solid #ccc;border-radius:8px;padding:6px 8px;font-size:12px;background:#fff;color:#1a1a1a}
input:disabled,select:disabled{opacity:0.5;background:#f5f4f0}
textarea.notabox{width:100%;border:0.5px solid #ccc;border-radius:8px;padding:10px;font-size:13px;background:#fff;color:#1a1a1a;resize:vertical;min-height:160px;line-height:1.7;font-family:inherit}
.assign-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.assign-box{flex:1;border:0.5px solid #e0ddd5;border-radius:8px;padding:8px 12px;font-size:12px;background:#fafaf8;min-width:130px}
.assign-box .al{font-size:10px;color:#888;margin-bottom:2px}
.assign-box .an{font-weight:500}
.assign-box .an.empty{color:#aaa;font-style:italic;font-weight:400}
.btn-asign{font-size:11px;padding:3px 10px;background:#E6F1FB;border-color:#185FA5;color:#185FA5;white-space:nowrap}
.btn-desasign{font-size:11px;padding:3px 10px;background:#fff5f5;border-color:#E24B4A;color:#A32D2D;white-space:nowrap}
.sla-box{background:#f5f4f0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.doc-box{background:#f5f4f0;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.doc-box .ds-label{font-size:11px;color:#888;margin-bottom:4px}
.doc-pending{margin-top:8px;border-top:0.5px solid #ddd;padding-top:6px}
.doc-pending-item{font-size:12px;color:#854F0B;padding:1px 0}
.check-item{border:0.5px solid #e0ddd5;border-radius:8px;margin-bottom:5px;overflow:hidden}
.check-head{display:flex;align-items:center;gap:8px;padding:7px 10px}
.check-head input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#185FA5;flex-shrink:0}
.clabel{font-size:13px;flex:1;cursor:pointer}
.clabel.done{text-decoration:line-through;color:#aaa}
.check-comment{padding:0 10px 7px 33px}
.check-comment input{width:100%;border:0.5px solid #ccc;border-radius:8px;padding:5px 8px;font-size:12px;background:#f5f4f0;font-family:inherit}
.del-check{padding:2px 6px;font-size:10px;border-color:#E24B4A;color:#A32D2D;opacity:0}
.check-item:hover .del-check{opacity:1}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input{flex:1}
.pb-wrap{background:#ececec;border-radius:10px;height:6px;margin:4px 0 12px;overflow:hidden}
.pb{height:100%;border-radius:10px;background:#639922;transition:width 0.3s}
.action-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.btn-del{border-color:#E24B4A;color:#A32D2D}
.btn-del:hover{background:#FCEBEB}
.btn-dev{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.btn-wm{background:#0F6E56;color:#9FE1CB;border-color:#0F6E56}
.btn-copy{background:#EEEDFE;color:#3C3489;border-color:#7F77DD}
.btn-iniciar{background:#EAF3DE;color:#3B6D11;border-color:#639922;white-space:nowrap}
.email-box{background:#f5f4f0;border:0.5px solid #e0ddd5;border-radius:8px;padding:10px;margin-top:8px;font-size:12px;white-space:pre-wrap;line-height:1.6}
.copy-ok{font-size:11px;color:#3B6D11;margin-left:8px;opacity:0;transition:opacity 0.3s}
.arch-group-title{font-size:12px;color:#888;font-weight:500;margin-bottom:6px;padding-bottom:4px;border-bottom:0.5px solid #e0ddd5}
.arch-item{border:0.5px solid #e0ddd5;border-radius:8px;margin-bottom:4px;overflow:hidden}
.arch-head{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:12px;cursor:pointer;flex-wrap:wrap}
.arch-head:hover{background:#f5f4f0}
.arch-body{padding:10px;border-top:0.5px solid #e0ddd5;display:none;font-size:12px}
.arch-body.open{display:block}
.arch-notes{white-space:pre-wrap;color:#666;background:#f5f4f0;padding:8px;border-radius:8px;margin-top:4px;font-size:12px;max-height:120px;overflow-y:auto}
.empty{text-align:center;color:#aaa;padding:2rem;font-size:13px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;border:0.5px solid #e0ddd5;padding:1.5rem;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.mfield{margin-bottom:10px}
.mfield label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:6px}
.sync-dot.off{background:#E24B4A}
.rtag{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px}
.r-analista{background:#FAEEDA;color:#854F0B}
.r-auxiliar{background:#E6F1FB;color:#185FA5}
.r-director{background:#EEEDFE;color:#3C3489}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="title">Tracker Crédito</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sync-dot" id="sync-dot"></span>
      <span class="user-pill" id="user-pill" onclick="showUserModal(false)">Cargando...</span>
    </div>
    <button class="primary" onclick="showNewCaseModal()">+ Nuevo caso</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <button class="tab active" data-tab="activos" onclick="switchTab(this)">Activos</button>
    <button class="tab" data-tab="devueltos" onclick="switchTab(this)">Devueltos</button>
    <button class="tab" data-tab="wm" onclick="switchTab(this)">Cargados en WM</button>
  </div>
  <div id="view-activos"><div class="empty">Cargando...</div></div>
  <div id="view-devueltos" style="display:none"></div>
  <div id="view-wm" style="display:none"></div>
  <div id="modals"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
 
const SURL='https://mkiljgppfvwannvyrqvb.supabase.co';
const SKEY='sb_publishable_GoPISZcO8JTOmqcveqyJVA_OqttydND';
const sb=supabase.createClient(SURL,SKEY);
 
const EA={
  en_espera:{label:'En espera',color:'espera',bg:'#F1EFE8',c:'#5F5E5A'},
  en_proceso:{label:'En proceso de estudio',color:'proceso',bg:'#FAEEDA',c:'#854F0B'},
  por_comite:{label:'Por presentar a comité',color:'comite',bg:'#EEEDFE',c:'#3C3489'},
  esperando_decision:{label:'Esperando decisión',color:'decision',bg:'#E6F1FB',c:'#185FA5'},
  cargado_wm:{label:'Cargado en WM',color:'cargado',bg:'#E1F5EE',c:'#085041'},
  devuelto:{label:'Devuelto',color:'devuelto',bg:'#FCEBEB',c:'#791F1F'}
};
const DE={
  sin_iniciar:{label:'Sin iniciar',bg:'#f0efe9',c:'#888'},
  en_revision:{label:'En revisión',bg:'#E6F1FB',c:'#185FA5'},
  incompleto:{label:'Incompleto',bg:'#FAEEDA',c:'#854F0B'},
  completo:{label:'Completo',bg:'#EAF3DE',c:'#3B6D11'}
};
const TIPOS={
  sin_flujo:{label:'Comité emp. sin flujo de caja',sla:1},
  con_flujo:{label:'Comité con flujo de caja',sla:2},
  junta:{label:'Junta directiva',sla:5},
  pendiente:{label:'Por definir',sla:null}
};
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const IA=['Documentación','GCC (mi parte)','GCC (Riesgo/Jurídico)','Matriz','Flujo de caja','Informe'];
const IU=['INFORME DE VISITA','1.1. Apartado informe de visita grupo económico','SOLICITUD DE VINCULACIÓN','CERTIFICADO DE EXISTENCIA Y REPRESENTACIÓN LEGAL','3.1. Ficha jurídica','COMPOSICIÓN ACCIONARIA','RUT','DOCUMENTO DE IDENTIDAD','FLUJO DE CAJA 5 AÑOS','EEFF CON NOTAS (año vigente y anterior)','DECLARACIÓN DE RENTA (año vigente y anterior)','BDME','TRANSUNION','VISOR JUDICIAL','JCC CONTADOR','JCC REVISOR FISCAL','PANTALLAZO RADICACIÓN WM – GRUPOS CONECTADOS','CONCEPTO SARLAFT POR COMPOSICIÓN ACCIONARIA'];
 
let user={nombre:'',rol:''};
let cases=[],checklists={},activeTab='activos',openCards={},openSecs={};
 
// USER
function loadUser(){const s=localStorage.getItem('tc_u3');if(s){user=JSON.parse(s);updatePill();return true;}return false;}
function saveUser(n,r){user={nombre:n,rol:r};localStorage.setItem('tc_u3',JSON.stringify(user));updatePill();}
function updatePill(){
  const p=document.getElementById('user-pill');
  const rc={analista:'r-analista',auxiliar:'r-auxiliar',director:'r-director'};
  if(p)p.innerHTML=user.nombre+' <span class="rtag '+(rc[user.rol]||'')+'">'+user.rol+'</span>';
}
function showUserModal(required){
  const m=document.getElementById('modals');
  m.innerHTML='';
  const bg=document.createElement('div');bg.className='modal-bg';
  if(!required)bg.onclick=function(e){if(e.target===bg)closeModal();};
  const box=document.createElement('div');box.className='modal';
  box.innerHTML='<h3>'+(required?'Bienvenido':'Cambiar perfil')+'</h3>'+
    '<div class="mfield"><label>Tu nombre</label><input type="text" id="u-nombre" value="'+user.nombre+'" placeholder="Ej: Laura Camila"></div>'+
    '<div class="mfield"><label>Rol</label><select id="u-rol">'+
      '<option value="analista"'+(user.rol==='analista'?' selected':'')+'>Analista</option>'+
      '<option value="auxiliar"'+(user.rol==='auxiliar'?' selected':'')+'>Auxiliar</option>'+
      '<option value="director"'+(user.rol==='director'?' selected':'')+'>Director</option>'+
    '</select></div>'+
    '<div class="mbtns">'+(required?'':'<button onclick="closeModal()">Cancelar</button>')+
    '<button class="primary" onclick="confirmUser()">Guardar</button></div>';
  bg.appendChild(box);m.appendChild(bg);
}
function confirmUser(){
  const n=document.getElementById('u-nombre').value.trim();
  const r=document.getElementById('u-rol').value;
  if(!n)return alert('Escribe tu nombre');
  saveUser(n,r);closeModal();render();
}
 
// SUPABASE
async function loadAll(){
  try{
    const {data:c}=await sb.from('casos').select('*').order('orden',{ascending:true});
    const {data:cl}=await sb.from('caso_checklist').select('*').order('orden',{ascending:true});
    cases=c||[];
    checklists={};
    (cl||[]).forEach(item=>{
      if(!checklists[item.caso_id])checklists[item.caso_id]={analista:[],auxiliar:[]};
      checklists[item.caso_id][item.tipo].push(item);
    });
    render();setSyncDot(true);
  }catch(e){console.error(e);setSyncDot(false);}
}
async function createCase(data){
  const maxO=cases.filter(c=>!c.archivado).length;
  const {data:nc,error}=await sb.from('casos').insert([{...data,orden:maxO,creado_por:user.nombre}]).select().single();
  if(error){alert('Error: '+error.message);return;}
  const tipo=data.tipo||'pendiente';
  const ai=IA.filter(l=>!(l==='Flujo de caja'&&tipo==='sin_flujo')).map((l,i)=>({caso_id:nc.id,tipo:'analista',label:l,done:false,comment:'',fixed:true,orden:i}));
  const ui=IU.map((l,i)=>({caso_id:nc.id,tipo:'auxiliar',label:l,done:false,comment:'',fixed:true,orden:i}));
  await sb.from('caso_checklist').insert([...ai,...ui]);
  await loadAll();
}
async function upCase(id,data){await sb.from('casos').update(data).eq('id',id);}
async function upItem(id,data){await sb.from('caso_checklist').update(data).eq('id',id);}
async function addCLItem(casoId,tipo,label){
  const items=(checklists[casoId]&&checklists[casoId][tipo])||[];
  const {data}=await sb.from('caso_checklist').insert([{caso_id:casoId,tipo,label,done:false,comment:'',fixed:false,orden:items.length}]).select().single();
  return data;
}
async function delItem(id){await sb.from('caso_checklist').delete().eq('id',id);}
async function delCase(id){await sb.from('casos').delete().eq('id',id);await loadAll();}
 
// SLA & DOC
function hoy(){return new Date().toISOString().split('T')[0];}
function diasDesde(f){if(!f)return null;return Math.floor((Date.now()-new Date(f).getTime())/864e5);}
function docGccOk(caso){
  const cl=checklists[caso.id];
  const d=cl&&cl.analista&&cl.analista.find(x=>x.label==='Documentación');
  return d&&d.done&&caso.gcc_propio==='completo'&&caso.gcc_riesgo==='completo';
}
function slaInfo(caso){
  if(caso.estado==='en_espera')return{cls:'sla-none badge',txt:'Sin iniciar'};
  const t=TIPOS[caso.tipo];if(!t||!t.sla)return{cls:'sla-none badge',txt:'SLA por definir'};
  if(!docGccOk(caso)||!caso.fecha_doc_completa)return{cls:'sla-paused badge',txt:'SLA pausado'};
  const d=diasDesde(caso.fecha_doc_completa),sla=t.sla;
  if(d>sla)return{cls:'sla-over badge',txt:'Vencido +'+(d-sla)+'d'};
  if(d===sla)return{cls:'sla-warn badge',txt:'Vence hoy'};
  if(sla>1&&d===sla-1)return{cls:'sla-warn badge',txt:'Día '+d+'/'+sla};
  return{cls:'sla-ok badge',txt:'Día '+d+'/'+sla};
}
function calcDocEst(casoId,fechaRev){
  const items=(checklists[casoId]&&checklists[casoId].auxiliar)||[];
  if(!fechaRev)return 'sin_iniciar';
  const done=items.filter(x=>x.done).length;
  if(done===items.length&&items.length>0)return 'completo';
  return 'incompleto';
}
function getPending(casoId){return((checklists[casoId]&&checklists[casoId].auxiliar)||[]).filter(x=>!x.done);}
function checkProg(casoId,tipo){
  const items=(checklists[casoId]&&checklists[casoId][tipo])||[];
  if(!items.length)return 0;
  return Math.round(items.filter(x=>x.done).length/items.length*100);
}
 
// RENDER
function setSyncDot(on){const d=document.getElementById('sync-dot');if(d){d.className='sync-dot'+(on?'':' off');}}
function render(){renderStats();if(activeTab==='activos')renderActivos();else if(activeTab==='devueltos')renderDevueltos();else renderWM();}
function renderStats(){
  const act=cases.filter(c=>!c.archivado);
  const venc=act.filter(c=>slaInfo(c).cls.includes('sla-over')).length;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><b>'+act.length+'</b> activos</div>'+
    '<div class="stat"><b>'+act.filter(c=>c.estado==='en_espera').length+'</b> en espera</div>'+
    '<div class="stat"><b>'+act.filter(c=>['en_proceso','por_comite','esperando_decision'].includes(c.estado)).length+'</b> en proceso</div>'+
    (venc?'<div class="stat" style="background:#FCEBEB;color:#791F1F"><b>'+venc+'</b> SLA vencido</div>':'');
}
function renderActivos(){
  const el=document.getElementById('view-activos');
  const act=cases.filter(c=>!c.archivado);
  if(!act.length){el.innerHTML='<div class="empty">No hay casos activos.</div>';return;}
  el.innerHTML=act.map((c,i)=>cardHTML(c,i)).join('');
}
 
function cardHTML(c,i){
  const est=EA[c.estado]||EA.en_espera;
  const sla=slaInfo(c);
  const docEst=calcDocEst(c.id,c.fecha_revision);
  const db=DE[docEst]||DE.sin_iniciar;
  const sec=openSecs[c.id]||'datos';
  const ap=checkProg(c.id,'analista');
  const xp=checkProg(c.id,'auxiliar');
  const pend=getPending(c.id);
  const isAux=user.rol==='auxiliar'||user.rol==='director';
  const isAna=user.rol==='analista'||user.rol==='director';
 
  let html='<div class="client-card '+est.color+'" id="card-'+c.id+'">';
 
  // HEADER
  html+='<div class="card-head" onclick="toggleCard(\''+c.id+'\')">'+
    '<div class="card-left">'+
      '<div class="card-title-row">'+
        '<span class="card-name">'+c.nombre+(c.prioridad?'<span class="priotag">PRIORIDAD</span>':'')+'</span>'+
        '<span class="card-nit">'+(c.nit||'')+'</span>'+
      '</div>'+
      '<div class="card-roles-row" id="roles-'+c.id+'">'+
        '<span class="role-status"><b>Analista:</b> '+(c.analista_nombre||'Sin asignar')+
          ' &middot; <span class="badge" style="background:'+est.bg+';color:'+est.c+';padding:1px 6px">'+est.label+'</span></span>'+
        '<span class="role-status"><b>Auxiliar:</b> '+(c.auxiliar_nombre||'Sin asignar')+
          ' &middot; <span class="badge" style="background:'+db.bg+';color:'+db.c+';padding:1px 6px">'+db.label+'</span></span>'+
      '</div>'+
    '</div>'+
    '<div class="card-right">'+
      '<span class="'+sla.cls+'" id="slabadge-'+c.id+'">'+sla.txt+'</span>'+
      '<span class="arrow" id="arrow-'+c.id+'">&#9660;</span>'+
    '</div>'+
  '</div>';
 
  // BODY
  html+='<div class="card-body'+(openCards[c.id]?' open':'')+'" id="body-'+c.id+'">';
 
  // TABS
  html+='<div class="stabs">';
  html+='<button class="stab'+(sec==='datos'?' active':'')+'" data-id="'+c.id+'" data-sec="datos" onclick="switchSec(this)">Datos</button>';
  if(isAux){

function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
 
function renderCL(casoId,tipo){
  const items=(checklists[casoId]&&checklists[casoId][tipo])||[];
  return items.map(function(it){
    let h='<div class="check-item"><div class="check-head">';
    h+='<input type="checkbox" id="cb-'+it.id+'" '+(it.done?'checked':'')+' data-casoid="'+casoId+'" data-itemid="'+it.id+'" data-tipo="'+tipo+'" onchange="toggleItem(this)">';
    h+='<label class="clabel'+(it.done?' done':'')+'" for="cb-'+it.id+'">'+it.label+'</label>';
    if(!it.fixed)h+='<button class="del-check btn-del" data-casoid="'+casoId+'" data-itemid="'+it.id+'" data-tipo="'+tipo+'" onclick="removeItemUI(this)">&#10005;</button>';
    h+='</div>';
    if(!it.done)h+='<div class="check-comment"><input type="text" placeholder="&#191;Qu&#233; falta?" value="'+esc(it.comment||'')+'" data-itemid="'+it.id+'" data-casoid="'+casoId+'" data-tipo="'+tipo+'" onchange="commentChange(this)"></div>';
    h+='</div>';
    return h;
  }).join('');
}
 
function buildEmail(caso){
  const pend=getPending(caso.id);
  if(!pend.length)return 'No hay documentos pendientes.';
  const lines=['Buen día,','','Revisando la documentación de la compañía en asunto, hace falta lo siguiente para dar continuidad al estudio:',''];
  pend.forEach(function(x,i){
    lines.push((i+1)+'. '+x.label+(x.comment?': '+x.comment:''));
  });
  lines.push('','Quedo atenta, muchas gracias.');
  return lines.join('\n');
}

function toggleCard(id){
  openCards[id]=!openCards[id];
  const body=document.getElementById('body-'+id);

  if(body)body.classList.toggle('open',openCards[id]);

function switchSec(el){
  const id=el.dataset.id, sec=el.dataset.sec;
  openSecs[id]=sec;
  const allSecs=['datos','aux','correo','checklist','comite','info'];
  allSecs.forEach(function(s){const d=document.getElementById('sec-'+s+'-'+id);if(d)d.style.display=s===sec?'block':'none';});
  el.closest('.stabs').querySelectorAll('.stab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');

async function fieldChange(el){

async function iniciarRevision(el){

}
async function toggleItem(el){
  const casoId=el.dataset.casoid, itemId=el.dataset.itemid, tipo=el.dataset.tipo, done=el.checked;
  const c=cases.find(function(x){return x.id===casoId;});
  const cl=checklists[casoId]&&checklists[casoId][tipo];
  const item=cl&&cl.find(function(x){return x.id===itemId;});if(!item)return;
  item.done=done;if(done)item.comment='';
  await upItem(itemId,{done:done,comment:''});
  if(tipo==='analista'&&item.label==='Documentación'){
    if(done&&docGccOk(c)&&!c.fecha_doc_completa&&c.estado!=='en_espera'){const t=hoy();c.fecha_doc_completa=t;await upCase(casoId,{fecha_doc_completa:t});}
    if(!done){c.fecha_doc_completa='';await upCase(casoId,{fecha_doc_completa:''});}
    refreshSLA(casoId);
  }
  if(tipo==='auxiliar'){
    const docEst=calcDocEst(casoId,c.fecha_revision);
    if(docEst==='completo'&&!c.fecha_doc_completa){const t=hoy();c.fecha_doc_completa=t;await upCase(casoId,{fecha_doc_completa:t});}
    refreshDocStatus(casoId);
  }
  const clEl=document.getElementById('cl-'+(tipo==='analista'?'an':'aux')+'-'+casoId);
  if(clEl)clEl.innerHTML=renderCL(casoId,tipo);
  const bar=document.getElementById('pb-'+(tipo==='analista'?'an':'aux')+'-'+casoId);
  if(bar)bar.style.width=checkProg(casoId,tipo)+'%';
}
async function commentChange(el){
  const itemId=el.dataset.itemid, casoId=el.dataset.casoid, tipo=el.dataset.tipo, val=el.value;
  const cl=checklists[casoId]&&checklists[casoId][tipo];
  const item=cl&&cl.find(function(x){return x.id===itemId;});if(item)item.comment=val;
  await upItem(itemId,{comment:val});
  if(tipo==='auxiliar')refreshDocStatus(casoId);
}

async function moveUp(el){

  const act=cases.filter(function(c){return !c.archivado;});
  const ai=act.findIndex(function(x){return x.id===id;});if(ai<=0)return;
  const cur=act[ai],prev=act[ai-1];const tmp=cur.orden;
  await upCase(id,{orden:prev.orden});await upCase(prev.id,{orden:tmp});await loadAll();
}
async function moveDown(el){
  const id=el.dataset.id;
  const act=cases.filter(function(c){return !c.archivado;});
  const ai=act.findIndex(function(x){return x.id===id;});if(ai<0||ai>=act.length-1)return;
  const cur=act[ai],next=act[ai+1];const tmp=cur.orden;
  await upCase(id,{orden:next.orden});await upCase(next.id,{orden:tmp});await loadAll();
}

  const el=document.getElementById('view-devueltos');
  const devueltos=cases.filter(function(c){return c.archivado&&c.tipo_cierre==='devuelto';});
  if(!devueltos.length){el.innerHTML='<div class="empty">No hay casos devueltos.</div>';return;}
  el.innerHTML=devueltos.map(function(c){
    return '<div class="arch-item"><div class="arch-head" onclick="this.nextElementSibling.classList.toggle(\'open\')">'+
      '<span style="font-weight:500;flex:1">'+c.nombre+'</span>'+
      '<span style="color:#888">'+(c.nit||'')+'</span>'+
      '<span class="badge" style="background:#FCEBEB;color:#791F1F">Devuelto '+(c.fecha_cierre||'')+'</span>'+
      (c.motivo_devolucion?'<span style="font-size:11px;color:#791F1F">'+c.motivo_devolucion+'</span>':'')+
      '<span style="font-size:10px;color:#aaa">&#9660;</span></div>'+
      '<div class="arch-body">'+
      (c.notas_devolucion?'<div style="margin-bottom:8px"><div style="font-size:11px;color:#888;margin-bottom:3px">Qué faltó:</div><div class="arch-notes">'+c.notas_devolucion+'</div></div>':'')+
      '<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">'+
      '<button onclick="reactivar(\''+c.id+'\')">Reactivar</button>'+
      '<button class="btn-del" onclick="if(confirm(\'¿Eliminar?\'))delCase(\''+c.id+'\')">Eliminar</button></div></div></div>';
  }).join('');
}
function renderWM(){
  const el=document.getElementById('view-wm');
  const wm=cases.filter(function(c){return c.archivado&&c.tipo_cierre==='wm';});
  if(!wm.length){el.innerHTML='<div class="empty">Aún no hay casos cargados en WM.</div>';return;}
  const groups={};
  wm.forEach(function(c){const k=c.anio_wm+'-'+String(c.mes_wm).padStart(2,'0');if(!groups[k])groups[k]=[];groups[k].push(c);});
  el.innerHTML=Object.keys(groups).sort().reverse().map(function(k){
    const parts=k.split('-');
    return '<div style="margin-bottom:1rem"><div class="arch-group-title">'+MESES[parseInt(parts[1])-1]+' '+parts[0]+' ('+groups[k].length+')</div>'+
      groups[k].map(function(c){
        return '<div class="arch-item"><div class="arch-head" onclick="this.nextElementSibling.classList.toggle(\'open\')">'+
          '<span style="font-weight:500;flex:1">'+c.nombre+'</span>'+
          '<span style="font-size:12px;color:#888">'+(c.nit||'')+'</span>'+
          '<span class="badge" style="background:#E1F5EE;color:#085041">WM '+(c.fecha_cierre||'')+'</span>'+
          '<span style="font-size:10px;color:#aaa">&#9660;</span></div>'+
          '<div class="arch-body">'+
          (c.nota_comite?'<div style="margin-bottom:6px"><div style="font-size:11px;color:#888;margin-bottom:2px">Comité:</div><div class="arch-notes">'+c.nota_comite+'</div></div>':'')+
          '<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">'+
          '<button onclick="reactivar(\''+c.id+'\')">Restaurar</button>'+
          '<button class="btn-del" onclick="if(confirm(\'¿Eliminar?\'))delCase(\''+c.id+'\')">Eliminar</button></div></div></div>';
      }).join('')+'</div>';
  }).join('');
}
 
function switchTab(el){
  activeTab=el.dataset.tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  ['activos','devueltos','wm'].forEach(function(t){document.getElementById('view-'+t).style.display=t===activeTab?'block':'none';});
  render();
}
function closeModal(){document.getElementById('modals').innerHTML='';}
 
function showNewCaseModal(){
  const today=hoy();
  const m=document.getElementById('modals');m.innerHTML='';
  const bg=document.createElement('div');bg.className='modal-bg';bg.onclick=function(e){if(e.target===bg)closeModal();};
  const box=document.createElement('div');box.className='modal';
  box.innerHTML='<h3>Nuevo caso</h3>'+
    '<div class="mfield"><label>Razón social</label><input type="text" id="nc-nombre" placeholder="Ej: MEJOR CDT SAS"></div>'+
    '<div class="mfield"><label>NIT</label><input type="text" id="nc-nit" placeholder="Ej: 901495024"></div>'+
    '<div class="mfield"><label>Gerente de cuenta</label><input type="text" id="nc-gerente" placeholder="Nombre del gerente"></div>'+
    '<div class="mfield"><label>Fecha de radicación</label><input type="date" id="nc-fecha" value="'+today+'"></div>'+
    '<div class="mbtns"><button onclick="closeModal()">Cancelar</button><button class="primary" onclick="submitNewCase()">Crear caso</button></div>';
  bg.appendChild(box);m.appendChild(bg);
}
async function submitNewCase(){
  const nombre=document.getElementById('nc-nombre').value.trim();
  if(!nombre)return alert('La razón social es obligatoria');
  const data={
    nombre,nit:document.getElementById('nc-nit').value.trim(),
    gerente_cuenta:document.getElementById('nc-gerente').value.trim(),
    fecha_inicio:document.getElementById('nc-fecha').value,
    tipo:'pendiente',estado:'en_espera',
    gcc_propio:'pendiente',gcc_riesgo:'pendiente',prioridad:false,
    fecha_doc_completa:'',fecha_revision:'',nota_comite:'',nota_info:'',
    analista_nombre:user.rol==='analista'?user.nombre:'',
    auxiliar_nombre:user.rol==='auxiliar'?user.nombre:''
  };
  closeModal();await createCase(data);
}
 
function subscribeRealtime(){
  sb.channel('tc').on('postgres_changes',{event:'*',schema:'public',table:'casos'},function(){loadAll();})
    .on('postgres_changes',{event:'*',schema:'public',table:'caso_checklist'},function(){loadAll();})
    .subscribe(function(s){setSyncDot(s==='SUBSCRIBED');});
}
 
async function init(){
  document.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&e.target.matches('[data-tipo]')&&e.target.id&&e.target.id.startsWith('addinp')){
      addItemUI(e.target.dataset.id,e.target.dataset.tipo);
    }
  });
  const hasUser=loadUser();
  if(!hasUser)showUserModal(true);
  await loadAll();
  subscribeRealtime();
}
init();
 
</script>
