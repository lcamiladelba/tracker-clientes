<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Crédito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:600;color:#1a1a1a}
.user-pill{font-size:12px;background:#fff;border:0.5px solid #ddd;border-radius:20px;padding:4px 12px;color:#555;cursor:pointer}
.user-pill:hover{background:#f0efe9}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.stat{background:#fff;border:0.5px solid #e0ddd5;border-radius:8px;padding:5px 10px;font-size:12px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}
.topbtns{display:flex;gap:6px}
button{border:0.5px solid #ccc;background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#1a1a1a}
button:hover{background:#f0efe9}
button.primary{background:#185FA5;color:#B5D4F4;border-color:#185FA5}
button.primary:hover{background:#0C447C}
.tabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:0.5px solid #ddd;padding-bottom:8px}
.tab{padding:5px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888}
.tab.active{background:#ececec;color:#1a1a1a;font-weight:500}
.client-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;margin-bottom:8px;overflow:hidden;border-left:3px solid #aaa}
.client-card.espera{border-left-color:#B4B2A9}
.client-card.proceso{border-left-color:#EF9F27}
.client-card.comite{border-left-color:#7F77DD}
.client-card.decision{border-left-color:#378ADD}
.client-card.cargado{border-left-color:#1D9E75}
.client-card.devuelto{border-left-color:#E24B4A}
.priotag{font-size:10px;background:#FAEEDA;color:#854F0B;padding:2px 5px;border-radius:4px;margin-left:4px}
.card-head{display:flex;align-items:center;gap:6px;padding:10px 12px;cursor:pointer;flex-wrap:wrap}
.card-head:hover{background:#fafaf8}
.orden{font-size:11px;color:#aaa;min-width:18px}
.client-name{font-weight:500;font-size:13px;flex:1}
.nit{font-size:11px;color:#888}
.head-badges{display:flex;align-items:center;gap:5px;margin-left:auto;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.sla-ok{background:#EAF3DE;color:#3B6D11}
.sla-warn{background:#FAEEDA;color:#854F0B}
.sla-over{background:#FCEBEB;color:#791F1F}
.sla-paused{background:#F1EFE8;color:#5F5E5A}
.sla-none{background:#f0efe9;color:#aaa}
.assign-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#E6F1FB;color:#185FA5;white-space:nowrap}
.assign-pill.empty{background:#f5f5f5;color:#aaa;font-style:italic}
.arrow{font-size:10px;color:#aaa;transition:transform 0.2s}
.card-body{padding:12px 16px;border-top:0.5px solid #e0ddd5;display:none}
.card-body.open{display:block}
.stabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:0.5px solid #e0ddd5;padding-bottom:6px;flex-wrap:wrap}
.stab{padding:4px 10px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#888;border-radius:8px}
.stab.active{background:#ececec;color:#1a1a1a;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fl{font-size:11px;color:#888;display:block;margin-bottom:3px}
select,input[type=text],input[type=date]{width:100%;border:0.5px solid #ccc;border-radius:8px;padding:6px 8px;font-size:12px;background:#fff;color:#1a1a1a}
textarea.notabox{width:100%;border:0.5px solid #ccc;border-radius:8px;padding:10px;font-size:13px;background:#fff;color:#1a1a1a;resize:vertical;min-height:160px;line-height:1.7;font-family:inherit}
.gcc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.assign-row{display:flex;gap:8px;align-items:center;padding:8px 0;flex-wrap:wrap}
.assign-box{flex:1;border:0.5px solid #e0ddd5;border-radius:8px;padding:8px 12px;font-size:12px;background:#fafaf8}
.assign-box .alabel{font-size:10px;color:#888;margin-bottom:2px}
.assign-box .aname{font-weight:500;color:#1a1a1a}
.assign-box .aname.empty{color:#aaa;font-style:italic;font-weight:400}
.btn-asign{font-size:11px;padding:3px 10px;background:#E6F1FB;border-color:#185FA5;color:#185FA5}
.btn-asign:hover{background:#B5D4F4}
.btn-desasign{font-size:11px;padding:3px 10px;background:#fff5f5;border-color:#E24B4A;color:#A32D2D}
.sla-box{background:#f5f4f0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.check-item{border:0.5px solid #e0ddd5;border-radius:8px;margin-bottom:5px;overflow:hidden}
.check-head{display:flex;align-items:center;gap:8px;padding:7px 10px}
.check-head input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#185FA5;flex-shrink:0}
.clabel{font-size:13px;flex:1;cursor:pointer}
.clabel.done{text-decoration:line-through;color:#aaa}
.check-comment{padding:0 10px 7px 33px}
.check-comment input{width:100%;border:0.5px solid #ccc;border-radius:8px;padding:5px 8px;font-size:12px;background:#f5f4f0;color:#1a1a1a;font-family:inherit}
.del-check{padding:2px 6px;font-size:10px;border-color:#E24B4A;color:#A32D2D;opacity:0}
.check-item:hover .del-check{opacity:1}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input{flex:1}
.pb-wrap{background:#ececec;border-radius:10px;height:6px;margin:4px 0 12px;overflow:hidden}
.pb{height:100%;border-radius:10px;background:#639922;transition:width 0.3s}
.action-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.btn-del{border-color:#E24B4A;color:#A32D2D}
.btn-del:hover{background:#FCEBEB}
.btn-dev{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.btn-wm{background:#0F6E56;color:#9FE1CB;border-color:#0F6E56}
.btn-copy{background:#EEEDFE;color:#3C3489;border-color:#7F77DD}
.email-box{background:#f5f4f0;border:0.5px solid #e0ddd5;border-radius:8px;padding:10px;margin-top:8px;font-size:12px;white-space:pre-wrap;line-height:1.6;color:#1a1a1a}
.copy-ok{font-size:11px;color:#3B6D11;margin-left:8px;opacity:0;transition:opacity 0.3s}
.arch-group-title{font-size:12px;color:#888;font-weight:500;margin-bottom:6px;padding-bottom:4px;border-bottom:0.5px solid #e0ddd5}
.arch-item{border:0.5px solid #e0ddd5;border-radius:8px;margin-bottom:4px;overflow:hidden}
.arch-head{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:12px;cursor:pointer;flex-wrap:wrap}
.arch-head:hover{background:#f5f4f0}
.arch-body{padding:10px;border-top:0.5px solid #e0ddd5;display:none;font-size:12px}
.arch-body.open{display:block}
.arch-notes{white-space:pre-wrap;color:#666;background:#f5f4f0;padding:8px;border-radius:8px;margin-top:4px;font-size:12px;max-height:120px;overflow-y:auto}
.empty{text-align:center;color:#aaa;padding:2rem;font-size:13px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;border:0.5px solid #e0ddd5;padding:1.5rem;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.mfield{margin-bottom:10px}
.mfield label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.loading{text-align:center;color:#888;padding:2rem;font-size:13px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:6px}
.sync-dot.off{background:#E24B4A}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="title">Tracker Crédito</span>
    <div id="user-display" style="display:flex;align-items:center;gap:8px">
      <span class="sync-dot" id="sync-dot" title="Conectado"></span>
      <span class="user-pill" onclick="showUserModal()" id="user-pill">Cargando...</span>
    </div>
    <div class="topbtns">
      <button class="primary" onclick="showNewCaseModal()">+ Nuevo caso</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('activos',this)">Activos</button>
    <button class="tab" onclick="switchTab('devueltos',this)">Devueltos</button>
    <button class="tab" onclick="switchTab('wm',this)">Cargados en WM</button>
  </div>
  <div id="view-activos"><div class="loading">Cargando casos...</div></div>
  <div id="view-devueltos" style="display:none"></div>
  <div id="view-wm" style="display:none"></div>
  <div id="modals"></div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SURL = 'https://mkiljgppfvwannvyrqvb.supabase.co';
const SKEY = 'sb_publishable_GoPISZcO8JTOmqcveqyJVA_OqttydND';
const sb = supabase.createClient(SURL, SKEY);
 
const ESTADOS = {
  en_espera:{label:'En espera',color:'espera',bg:'#F1EFE8',c:'#5F5E5A'},
  en_proceso:{label:'En proceso',color:'proceso',bg:'#FAEEDA',c:'#854F0B'},
  por_comite:{label:'Por presentar a comité',color:'comite',bg:'#EEEDFE',c:'#3C3489'},
  esperando_decision:{label:'Esperando decisión',color:'decision',bg:'#E6F1FB',c:'#185FA5'},
  cargado_wm:{label:'Cargado en WM',color:'cargado',bg:'#E1F5EE',c:'#085041'},
  devuelto:{label:'Devuelto',color:'devuelto',bg:'#FCEBEB',c:'#791F1F'}
};
const TIPOS = {
  sin_flujo:{label:'Comité emp. sin flujo de caja',sla:1},
  con_flujo:{label:'Comité con flujo de caja',sla:2},
  junta:{label:'Junta directiva',sla:5},
  pendiente:{label:'Por definir',sla:null}
};
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ITEMS_ANALISTA = ['Documentación','GCC (mi parte)','GCC (Riesgo/Jurídico)','Matriz','Flujo de caja','Informe'];
const ITEMS_AUXILIAR = [
  'INFORME DE VISITA','1.1. Apartado informe de visita grupo económico',
  'SOLICITUD DE VINCULACIÓN','CERTIFICADO DE EXISTENCIA Y REPRESENTACIÓN LEGAL',
  '3.1. Ficha jurídica','COMPOSICIÓN ACCIONARIA','RUT','DOCUMENTO DE IDENTIDAD',
  'FLUJO DE CAJA 5 AÑOS','EEFF CON NOTAS (año vigente y anterior)',
  'DECLARACIÓN DE RENTA (año vigente y anterior)','BDME','TRANSUNION',
  'VISOR JUDICIAL','JCC CONTADOR','JCC REVISOR FISCAL',
  'PANTALLAZO RADICACIÓN WM – GRUPOS CONECTADOS','CONCEPTO SARLAFT POR COMPOSICIÓN ACCIONARIA'
];
 
let user = {nombre:'', rol:''};
let cases = [];
let checklists = {};
let activeTab = 'activos';
let openCards = {};
let openSecs = {};
 
// ---- USER ----
function loadUser() {
  const s = localStorage.getItem('tc_user');
  if (s) { user = JSON.parse(s); updateUserPill(); return true; }
  return false;
}
function saveUser(n, r) { user = {nombre:n, rol:r}; localStorage.setItem('tc_user', JSON.stringify(user)); updateUserPill(); }
function updateUserPill() {
  const pill = document.getElementById('user-pill');
  if (pill) pill.textContent = user.nombre + ' · ' + user.rol;
}
function showUserModal(required) {
  document.getElementById('modals').innerHTML = `
  <div class="modal-bg" ${required?'':'onclick="if(event.target===this)closeModal()"'}>
    <div class="modal">
      <h3>${required ? 'Bienvenido — ¿Quién eres?' : 'Cambiar perfil'}</h3>
      <div class="mfield"><label>Tu nombre</label><input type="text" id="u-nombre" value="${user.nombre}" placeholder="Ej: Laura Camila"></div>
      <div class="mfield"><label>Rol</label>
        <select id="u-rol">
          <option value="analista" ${user.rol==='analista'?'selected':''}>Analista</option>
          <option value="auxiliar" ${user.rol==='auxiliar'?'selected':''}>Auxiliar</option>
          <option value="practicante" ${user.rol==='practicante'?'selected':''}>Practicante</option>
        </select>
      </div>
      <div class="mbtns">
        ${required?'':'<button onclick="closeModal()">Cancelar</button>'}
        <button class="primary" onclick="confirmUser()">Guardar</button>
      </div>
    </div>
  </div>`;
}
function confirmUser() {
  const n = document.getElementById('u-nombre').value.trim();
  const r = document.getElementById('u-rol').value;
  if (!n) return alert('Escribe tu nombre');
  saveUser(n, r); closeModal(); render();
}
 
// ---- SUPABASE CRUD ----
async function loadAll() {
  try {
    const { data: casosData } = await sb.from('casos').select('*').order('orden', {ascending: true});
    const { data: clData } = await sb.from('caso_checklist').select('*').order('orden', {ascending: true});
    cases = casosData || [];
    checklists = {};
    (clData || []).forEach(item => {
      if (!checklists[item.caso_id]) checklists[item.caso_id] = {analista:[], auxiliar:[]};
      checklists[item.caso_id][item.tipo] = checklists[item.caso_id][item.tipo] || [];
      checklists[item.caso_id][item.tipo].push(item);
    });
    render();
    setSyncDot(true);
  } catch(e) { console.error(e); setSyncDot(false); }
}
 
async function createCase(data) {
  const maxOrden = cases.length > 0 ? Math.max(...cases.map(c=>c.orden||0)) + 1 : 0;
  const caseData = {...data, orden: maxOrden, creado_por: user.nombre};
  const { data: newCase, error } = await sb.from('casos').insert([caseData]).select().single();
  if (error) { alert('Error al crear caso: ' + error.message); return null; }
  
  // Create analista checklist
  const items = ITEMS_ANALISTA.filter(l => !(l === 'Flujo de caja' && data.tipo === 'sin_flujo'));
  const aItems = items.map((l,i) => ({caso_id: newCase.id, tipo:'analista', label:l, done:false, comment:'', fixed:true, orden:i}));
  
  // Create auxiliar checklist
  const auxItems = ITEMS_AUXILIAR.map((l,i) => ({caso_id: newCase.id, tipo:'auxiliar', label:l, done:false, comment:'', fixed:true, orden:i}));
  
  await sb.from('caso_checklist').insert([...aItems, ...auxItems]);
  await loadAll();
  return newCase;
}
 
async function updateCase(id, data) {
  await sb.from('casos').update(data).eq('id', id);
}
 
async function updateCheckItem(id, data) {
  await sb.from('caso_checklist').update(data).eq('id', id);
}
 
async function addCheckItem(casoId, tipo, label) {
  const items = (checklists[casoId] && checklists[casoId][tipo]) || [];
  const orden = items.length;
  const { data } = await sb.from('caso_checklist').insert([{caso_id:casoId, tipo, label, done:false, comment:'', fixed:false, orden}]).select().single();
  return data;
}
 
async function deleteCheckItem(id) {
  await sb.from('caso_checklist').delete().eq('id', id);
}
 
async function deleteCase(id) {
  await sb.from('casos').delete().eq('id', id);
  await loadAll();
}
 
// ---- SLA ----
function diasDesde(f) { if(!f) return null; return Math.floor((Date.now()-new Date(f).getTime())/864e5); }
function docYGccCompleto(caso) {
  const cl = checklists[caso.id];
  const docItem = cl && cl.analista && cl.analista.find(x=>x.label==='Documentación');
  return docItem && docItem.done && caso.gcc_propio==='completo' && caso.gcc_riesgo==='completo';
}
function slaInfo(caso) {
  if (caso.estado==='en_espera') return {cls:'sla-none badge', txt:'Sin iniciar'};
  const t = TIPOS[caso.tipo];
  if (!t||!t.sla) return {cls:'sla-none badge', txt:'SLA por definir'};
  if (!docYGccCompleto(caso)||!caso.fecha_doc_completa) return {cls:'sla-paused badge', txt:'SLA pausado'};
  const d = diasDesde(caso.fecha_doc_completa), sla = t.sla;
  if (d > sla) return {cls:'sla-over badge', txt:'Vencido +'+(d-sla)+'d'};
  if (d === sla) return {cls:'sla-warn badge', txt:'Vence hoy ('+d+'/'+sla+'d)'};
  if (sla>1&&d===sla-1) return {cls:'sla-warn badge', txt:'Día '+d+'/'+sla};
  return {cls:'sla-ok badge', txt:'Día '+d+'/'+sla};
}
 
function checkProg(casoId, tipo) {
  const items = (checklists[casoId]&&checklists[casoId][tipo])||[];
  if (!items.length) return 0;
  return Math.round(items.filter(x=>x.done).length/items.length*100);
}
 
// ---- RENDER ----
function setSyncDot(on) {
  const d = document.getElementById('sync-dot');
  if (d) { d.className = 'sync-dot'+(on?'':' off'); d.title = on?'Conectado':'Sin conexión'; }
}
 
function render() {
  renderStats();
  if (activeTab==='activos') renderActivos();
  else if (activeTab==='devueltos') renderDevueltos();
  else renderWM();
}
 
function renderStats() {
  const activos = cases.filter(c=>!c.archivado);
  const venc = activos.filter(c=>slaInfo(c).cls.includes('sla-over')).length;
  const paused = activos.filter(c=>slaInfo(c).cls.includes('sla-paused')&&c.estado!=='en_espera').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><b>${activos.length}</b> activos</div>
    <div class="stat"><b>${activos.filter(c=>c.estado==='en_espera').length}</b> en espera</div>
    <div class="stat"><b>${activos.filter(c=>['en_proceso','por_comite','esperando_decision'].includes(c.estado)).length}</b> en proceso</div>
    ${paused?`<div class="stat" style="background:#F1EFE8;color:#5F5E5A"><b>${paused}</b> SLA pausado</div>`:''}
    ${venc?`<div class="stat" style="background:#FCEBEB;color:#791F1F"><b>${venc}</b> SLA vencido</div>`:''}
  `;
}
 
function renderActivos() {
  const el = document.getElementById('view-activos');
  const activos = cases.filter(c=>!c.archivado);
  if (!activos.length) { el.innerHTML = '<div class="empty">No hay casos activos.</div>'; return; }
  el.innerHTML = activos.map((c,i)=>cardHTML(c,i)).join('');
}
 
function cardHTML(c, i) {
  const est = ESTADOS[c.estado]||ESTADOS.en_espera;
  const sla = slaInfo(c);
  const sec = openSecs[c.id]||'datos';
  const ap = checkProg(c.id,'analista');
  const xp = checkProg(c.id,'auxiliar');
  return `<div class="client-card ${est.color}" id="card-${c.id}">
  <div class="card-head" onclick="toggleCard('${c.id}')">
    <span class="orden">${i+1}</span>
    <span class="client-name">${c.nombre}${c.prioridad?'<span class="priotag">PRIORIDAD</span>':''}</span>
    <span class="nit">${c.nit||''}</span>
    <span class="head-badges">
      <span class="${sla.cls}" id="slabadge-${c.id}">${sla.txt}</span>
      <span class="assign-pill ${c.analista_nombre?'':'empty'}">${c.analista_nombre||'Sin analista'}</span>
      <span class="assign-pill ${c.auxiliar_nombre?'':'empty'}">${c.auxiliar_nombre||'Sin auxiliar'}</span>
      <span class="badge" id="estbadge-${c.id}" style="background:${est.bg};color:${est.c}">${est.label}</span>
      <span class="arrow" id="arrow-${c.id}">▼</span>
    </span>
  </div>
  <div class="card-body${openCards[c.id]?' open':''}" id="body-${c.id}">
    <div class="stabs">
      <button class="stab${sec==='datos'?' active':''}" onclick="switchSec('${c.id}','datos',this)">Datos</button>
      <button class="stab${sec==='aux'?' active':''}" onclick="switchSec('${c.id}','aux',this)">Docs auxiliar${xp?' ('+xp+'%)':''}</button>
      <button class="stab${sec==='analista'?' active':''}" onclick="switchSec('${c.id}','analista',this)">Checklist${ap?' ('+ap+'%)':''}</button>
      <button class="stab${sec==='comite'?' active':''}" onclick="switchSec('${c.id}','comite',this)">Comité</button>
      <button class="stab${sec==='info'?' active':''}" onclick="switchSec('${c.id}','info',this)">Información</button>
      <button class="stab${sec==='email'?' active':''}" onclick="switchSec('${c.id}','email',this)">Correo</button>
    </div>
 
    <div id="sec-datos-${c.id}" style="display:${sec==='datos'?'block':'none'}">
      ${c.estado!=='en_espera'?`<div class="sla-box"><span class="badge ${sla.cls}">${sla.txt}</span><span style="font-size:12px;color:#666">${docYGccCompleto(c)&&c.fecha_doc_completa?'SLA corre desde que doc + GCC quedaron completos ('+c.fecha_doc_completa+')':'SLA pausado hasta que documentación Y GCC estén completos.'}</span></div>`:''}
      <div class="assign-row">
        <div class="assign-box">
          <div class="alabel">Analista</div>

function renderCL(casoId, tipo) {
  const items = (checklists[casoId]&&checklists[casoId][tipo])||[];
  return items.map(it=>`<div class="check-item">
    <div class="check-head">
      <input type="checkbox" id="cb-${it.id}" ${it.done?'checked':''} onchange="toggleItem('${casoId}','${it.id}','${tipo}',this.checked)">
      <label class="clabel${it.done?' done':''}" for="cb-${it.id}">${it.label}</label>
      ${!it.fixed?`<button class="del-check btn-del" onclick="removeItem('${casoId}','${it.id}','${tipo}')">✕</button>`:''}
    </div>
    ${!it.done?`<div class="check-comment"><input type="text" placeholder="¿Qué falta?" value="${(it.comment||'').replace(/"/g,'&quot;')}" onchange="commentChange('${it.id}','${casoId}','${tipo}',this.value)"></div>`:''}
  </div>`).join('');
}
 
function buildEmail(caso) {
  const items = (checklists[caso.id]&&checklists[caso.id]['auxiliar'])||[];
  const pend = items.filter(x=>!x.done);
  if (!pend.length) return 'No hay ítems pendientes en el checklist documental.';
  let txt = 'Buen día,
 
Revisando la documentación de la compañía en asunto, hace falta lo siguiente para dar continuidad al estudio:
 
';
  pend.forEach((x,i) => {
    let line = (i+1)+'. ';
    if (x.comment) line += x.label + ': ' + x.comment;
    else line += x.label;
    txt += line + '
';
  });
  txt += '
Quedo atenta, muchas gracias.';
  return txt;
}
 
function copyEmail(id) {
  const el = document.getElementById('emailbox-'+id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    const ok = document.getElementById('copyok-'+id);
    if (ok) { ok.style.opacity='1'; setTimeout(()=>ok.style.opacity='0',2000); }
  });
}

async function toggleCard(id) {
  openCards[id] = !openCards[id];

function switchSec(id, sec, el) {

async function fieldChange(id, field, val) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  c[field] = val;
  await updateCase(id, {[field]: val});
  refreshCard(id);
  renderStats();
}
 
async function gccChange(id, field, val) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  c[field] = val;
  await updateCase(id, {[field]: val});
  // Check if doc+gcc now complete and set fecha
  if (docYGccCompleto(c) && !c.fecha_doc_completa && c.estado !== 'en_espera') {
    const today = new Date().toISOString().split('T')[0];
    c.fecha_doc_completa = today;
    await updateCase(id, {fecha_doc_completa: today});
    const fd = document.getElementById('fdoc-'+id);
    if (fd) { fd.value = today; fd.disabled = false; fd.style.opacity='1'; }
  }
  refreshSLA(id);
}
 
async function toggleItem(casoId, itemId, tipo, done) {
  const c = cases.find(x=>x.id===casoId);
  const cl = checklists[casoId] && checklists[casoId][tipo];
  const item = cl && cl.find(x=>x.id===itemId);
  if (!item) return;
  item.done = done;
  if (done) item.comment = '';
  await updateCheckItem(itemId, {done, comment:''});
  
  // If doc item in analista checklist, check SLA
  if (tipo==='analista' && item.label==='Documentación') {
    if (done && docYGccCompleto(c) && !c.fecha_doc_completa && c.estado!=='en_espera') {
      const today = new Date().toISOString().split('T')[0];
      c.fecha_doc_completa = today;
      await updateCase(casoId, {fecha_doc_completa: today});
    }
    if (!done) { c.fecha_doc_completa=''; await updateCase(casoId, {fecha_doc_completa:''}); }
    refreshSLA(casoId);
  }
  
  const el = document.getElementById('cl-'+tipo.substring(0,2)+'-'+casoId);
  if (el) { el.innerHTML = renderCL(casoId, tipo); }
  else {
    const el2 = document.getElementById('cl-an-'+casoId);
    if (el2 && tipo==='analista') el2.innerHTML = renderCL(casoId, tipo);
    const el3 = document.getElementById('cl-aux-'+casoId);
    if (el3 && tipo==='auxiliar') el3.innerHTML = renderCL(casoId, tipo);
  }
  
  const prog = checkProg(casoId, tipo);
  const pbKey = tipo==='analista'?'pb-an-':'pb-aux-';
  const bar = document.getElementById(pbKey+casoId);
  if (bar) bar.style.width = prog+'%';
}
 
async function commentChange(itemId, casoId, tipo, val) {
  const cl = checklists[casoId] && checklists[casoId][tipo];
  const item = cl && cl.find(x=>x.id===itemId);
  if (item) item.comment = val;
  await updateCheckItem(itemId, {comment: val});
}
 
async function addItem(casoId, tipo) {
  const key = tipo==='auxiliar'?`add-aux-${casoId}`:`add-an-${casoId}`;
  const inp = document.getElementById(key);
  if (!inp || !inp.value.trim()) return;
  const label = inp.value.trim();
  inp.value = '';
  const newItem = await addCheckItem(casoId, tipo, label);
  if (newItem) {
    if (!checklists[casoId]) checklists[casoId] = {analista:[], auxiliar:[]};
    checklists[casoId][tipo].push(newItem);
  }
  const elKey = tipo==='analista'?'cl-an-':'cl-aux-';
  const el = document.getElementById(elKey+casoId);
  if (el) el.innerHTML = renderCL(casoId, tipo);
}
 
async function removeItem(casoId, itemId, tipo) {
  await deleteCheckItem(itemId);
  if (checklists[casoId] && checklists[casoId][tipo])
    checklists[casoId][tipo] = checklists[casoId][tipo].filter(x=>x.id!==itemId);
  const elKey = tipo==='analista'?'cl-an-':'cl-aux-';
  const el = document.getElementById(elKey+casoId);
  if (el) el.innerHTML = renderCL(casoId, tipo);
}
 
async function asignarme(casoId, rol) {
  const field = rol==='analista'?'analista_nombre':'auxiliar_nombre';
  const c = cases.find(x=>x.id===casoId); if(!c) return;
  c[field] = user.nombre;
  await updateCase(casoId, {[field]: user.nombre});

}
async function desasignarme(casoId, rol) {
  const field = rol==='analista'?'analista_nombre':'auxiliar_nombre';
  const c = cases.find(x=>x.id===casoId); if(!c) return;
  c[field] = '';
  await updateCase(casoId, {[field]: ''});
  refreshCard(casoId);
}
 
function refreshCard(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  const card = document.getElementById('card-'+id);
  if (!card) return;
  const est = ESTADOS[c.estado]||ESTADOS.en_espera;
  card.className = 'client-card '+est.color;
  const estBadge = document.getElementById('estbadge-'+id);
  if (estBadge) { estBadge.textContent=est.label; estBadge.style.background=est.bg; estBadge.style.color=est.c; }
  refreshSLA(id);
}
 
function refreshSLA(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  const sla = slaInfo(c);
  const b = document.getElementById('slabadge-'+id);
  if (b) { b.textContent=sla.txt; b.className=sla.cls; }
}
 
async function moveUp(id) {
  const i = cases.findIndex(x=>x.id===id&&!x.archivado);
  const activos = cases.filter(c=>!c.archivado);
  const ai = activos.findIndex(x=>x.id===id);
  if (ai<=0) return;
  const prev = activos[ai-1];
  [c.orden, prev.orden] = [prev.orden, activos[ai].orden];
  await updateCase(id, {orden: activos[ai].orden});
  await updateCase(prev.id, {orden: prev.orden});
  await loadAll();
}
 
async function moveDown(id) {
  const activos = cases.filter(c=>!c.archivado);
  const ai = activos.findIndex(x=>x.id===id);
  if (ai<0||ai>=activos.length-1) return;
  const next = activos[ai+1];
  const cur = activos[ai];
  const tmp = cur.orden;
  await updateCase(id, {orden: next.orden});
  await updateCase(next.id, {orden: tmp});
  await loadAll();
}
 
async function cargarWM(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  const now = new Date();
  await updateCase(id, {archivado:true, tipo_cierre:'wm', fecha_cierre:now.toLocaleDateString('es-CO'), anio_wm:now.getFullYear(), mes_wm:now.getMonth()+1});
  await loadAll();
}

function renderWM() {
  const el = document.getElementById('view-wm');
  const wm = cases.filter(c=>c.archivado&&c.tipo_cierre==='wm');
  if (!wm.length) { el.innerHTML='<div class="empty">Aún no hay casos cargados en WM.</div>'; return; }
  const groups = {};
  wm.forEach(c=>{ const k=`${c.anio_wm}-${String(c.mes_wm).padStart(2,'0')}`; if(!groups[k])groups[k]=[]; groups[k].push(c); });
  el.innerHTML = Object.keys(groups).sort().reverse().map(k=>{
    const [y,m] = k.split('-');
    return `<div style="margin-bottom:1rem"><div class="arch-group-title">${MESES[parseInt(m)-1]} ${y} (${groups[k].length})</div>
    ${groups[k].map(c=>`<div class="arch-item"><div class="arch-head" onclick="this.nextElementSibling.classList.toggle('open')">
      <span style="font-weight:500;flex:1">${c.nombre}</span>
      <span style="font-size:12px;color:#888">${c.nit||''}</span>
      <span class="badge" style="background:#E1F5EE;color:#085041">WM ${c.fecha_cierre||''}</span>
      <span style="font-size:10px;color:#aaa">▼</span>
    </div>
    <div class="arch-body">
      ${c.nota_comite?`<div style="margin-bottom:6px"><div style="font-size:11px;color:#888;margin-bottom:2px">Comité:</div><div class="arch-notes">${c.nota_comite}</div></div>`:''}
      ${c.nota_info?`<div style="margin-bottom:6px"><div style="font-size:11px;color:#888;margin-bottom:2px">Información:</div><div class="arch-notes">${c.nota_info}</div></div>`:''}
      <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
        <button onclick="reactivar('${c.id}')">Restaurar</button>
        <button class="btn-del" onclick="confirmDelete('${c.id}')">Eliminar</button>
      </div>
    </div></div>`).join('')}
    </div>`;
  }).join('');
}

    <div class="grid2" style="gap:10px">
      <div class="mfield"><label>Tipo de cliente</label>
        <select id="nc-tipo">${Object.keys(TIPOS).map(k=>`<option value="${k}">${TIPOS[k].label}</option>`).join('')}</select>
      </div>
      <div class="mfield"><label>Documentación inicial</label>
        <select id="nc-doc"><option value="incompleto">Incompleta</option><option value="completo">Completa</option></select>
      </div>
    </div>
    <div class="mfield"><label>Prioridad</label>
      <select id="nc-prio"><option value="false">No</option><option value="true">Sí</option></select>
    </div>
    <p style="font-size:11px;color:#aaa;margin-top:4px">El SLA corre cuando documentación Y GCC estén completos.</p>
    <div class="mbtns">
      <button onclick="closeModal()">Cancelar</button>
      <button class="primary" onclick="submitNewCase()">Crear caso</button>
    </div>
  </div></div>`;
}
 
async function submitNewCase() {
  const nombre = document.getElementById('nc-nombre').value.trim();
  if (!nombre) return alert('La razón social es obligatoria');
  const tipo = document.getElementById('nc-tipo').value;
  const data = {
    nombre, nit: document.getElementById('nc-nit').value.trim(),
    gerente_cuenta: document.getElementById('nc-gerente').value.trim(),
    tipo, estado:'en_espera',
    gcc_propio:'pendiente', gcc_riesgo:'pendiente',
    prioridad: document.getElementById('nc-prio').value==='true',
    fecha_inicio:'', fecha_doc_completa:'',
    nota_comite:'', nota_info:'',
    analista_nombre:'', auxiliar_nombre:''
  };
  closeModal();
  await createCase(data);
}
 
// ---- REALTIME ----
function subscribeRealtime() {
  sb.channel('tracker-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'casos'}, ()=>loadAll())
    .on('postgres_changes', {event:'*', schema:'public', table:'caso_checklist'}, ()=>loadAll())
    .subscribe(status => setSyncDot(status==='SUBSCRIBED'));
}
 
// ---- INIT ----
async function init() {
  const hasUser = loadUser();
  if (!hasUser) {
    showUserModal(true);
  }
  await loadAll();
  subscribeRealtime();
}
 
init();
</script>
